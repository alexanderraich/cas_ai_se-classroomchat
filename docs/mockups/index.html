<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Classroom Chat — Mockup</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <header>
      <span class="brand">Classroom Chat</span>
    </header>
    <div class="me" style="padding: 10px 16px; border-bottom: 1px solid var(--border);">
      <span class="avatar">M</span>
      <span>Mira</span>
    </div>
    <nav class="group-list" id="groupList">
      <div class="group active" data-id="g1">
        <span># Projekt KI</span>
      </div>
      <div class="group" data-id="g2"><span># Übung 03</span></div>
      <div class="group" data-id="g3"><span># Smalltalk</span></div>
    </nav>
    <div class="new-group">
      <button class="secondary" style="width:100%;" onclick="openModal('newGroupModal')">+ Neue Gruppe</button>
    </div>
  </aside>

  <main class="chat">
    <header>
      <div>
        <h2 id="groupTitle"># Projekt KI</h2>
        <div class="subtitle"><span id="memberCount">4</span> Mitglieder</div>
      </div>
      <div>
        <button class="secondary" onclick="openModal('settingsModal')">Einstellungen</button>
      </div>
    </header>

    <div class="feed" id="feed">
      <!-- wird per JS gerendert -->
    </div>

    <div class="composer">
      <form onsubmit="event.preventDefault(); sendMessage();">
        <textarea id="composerInput" placeholder="Nachricht an # Projekt KI…" maxlength="2000"></textarea>
        <button type="submit">Senden</button>
      </form>
    </div>
  </main>
</div>

<!-- Modal: Neue Gruppe (UC-2) -->
<div class="modal-backdrop" id="newGroupModal" style="display:none;">
  <div class="modal">
    <header>
      <h3>Neue Gruppe</h3>
      <button class="icon" onclick="closeModal('newGroupModal')">✕</button>
    </header>
    <div class="body">
      <div class="field">
        <label for="newGroupName">Gruppenname</label>
        <input id="newGroupName" type="text" placeholder="z. B. Übung 04" maxlength="64" />
      </div>
      <div class="banner">Du wirst automatisch Eigentümer dieser Gruppe.</div>
    </div>
    <div class="footer">
      <button class="secondary" onclick="closeModal('newGroupModal')">Abbrechen</button>
      <button onclick="createGroup()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Modal: Einstellungen / Mitgliederverwaltung (UC-3..UC-6) -->
<div class="modal-backdrop" id="settingsModal" style="display:none;">
  <div class="modal">
    <header>
      <h3>Gruppe „Projekt KI" verwalten</h3>
      <button class="icon" onclick="closeModal('settingsModal')">✕</button>
    </header>
    <div class="body">
      <div class="field">
        <label for="renameInput">Name der Gruppe</label>
        <input id="renameInput" type="text" value="Projekt KI" maxlength="64" />
      </div>
      <div class="field">
        <label>Mitglieder</label>
        <ul class="member-list">
          <li><span><span class="avatar">M</span> Mira</span><span class="owner-tag">Eigentümer</span></li>
          <li><span><span class="avatar" style="background:#7c3aed;">A</span> Anna</span><button class="secondary">Entfernen</button></li>
          <li><span><span class="avatar" style="background:#0ea5e9;">B</span> Ben</span><button class="secondary">Entfernen</button></li>
          <li><span><span class="avatar" style="background:#f97316;">L</span> Lukas</span><button class="secondary">Entfernen</button></li>
        </ul>
      </div>
      <div class="field">
        <label for="addMember">Mitglied hinzufügen</label>
        <input id="addMember" type="text" placeholder="Anzeigename suchen…" />
      </div>
    </div>
    <div class="footer">
      <button class="danger" onclick="if(confirm('Gruppe wirklich löschen?')) closeModal('settingsModal')">Gruppe löschen</button>
      <span style="flex:1"></span>
      <button class="secondary" onclick="closeModal('settingsModal')">Abbrechen</button>
      <button onclick="closeModal('settingsModal')">Speichern</button>
    </div>
  </div>
</div>

<script>
  // === Mock-State ===
  const ME = { name: 'Mira', initial: 'M', color: '#22c55e' };

  const sampleGroups = {
    g1: {
      name: 'Projekt KI',
      members: ['Mira', 'Anna', 'Ben', 'Lukas'],
      ownerIsMe: true,
      messages: [
        { author: 'Anna',  color: '#7c3aed', time: '09:12', text: 'Wer übernimmt die Architektur-Folien?' },
        { author: 'Ben',   color: '#0ea5e9', time: '09:13', text: 'Ich kann das machen, brauche aber Input zum Deployment.' },
        { author: 'Mira',  color: '#22c55e', time: '09:14', text: 'Render.com — dazu gleich ein paar Notizen.' },
        { author: 'Lukas', color: '#f97316', time: '09:20', text: 'Treffen heute 14 Uhr im Raum B2.07?' },
      ],
    },
    g2: { name: 'Übung 03', members: ['Mira','...','...','...','...','...','...','...','...','...','...','...'], ownerIsMe: false, messages: [] },
    g3: { name: 'Smalltalk', members: ['Mira','Anna','Ben','Lukas','...','...','...'], ownerIsMe: false, messages: [] },
  };
  let activeId = 'g1';
  let nextId = 4;

  // === Rendering ===
  function renderSidebar() {
    const list = document.getElementById('groupList');
    list.innerHTML = '';
    Object.entries(sampleGroups).forEach(([id, g]) => {
      const el = document.createElement('div');
      el.className = 'group' + (id === activeId ? ' active' : '');
      el.dataset.id = id;
      const name = document.createElement('span');
      name.textContent = '# ' + g.name;
      el.appendChild(name);
      el.addEventListener('click', () => switchGroup(id));
      list.appendChild(el);
    });
  }

  function renderHeader() {
    const g = sampleGroups[activeId];
    document.getElementById('groupTitle').textContent = '# ' + g.name;
    document.getElementById('memberCount').textContent = g.members.length;
    document.getElementById('composerInput').placeholder = 'Nachricht an # ' + g.name + '…';
  }

  function renderFeed() {
    const g = sampleGroups[activeId];
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    if (g.messages.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div style="font-size:32px; margin-bottom:8px;">💬</div>'
        + '<div><strong>Noch keine Nachrichten</strong></div>'
        + '<div>Sei die Erste, die hier etwas schreibt.</div>';
      feed.appendChild(empty);
      return;
    }
    g.messages.forEach(m => feed.appendChild(buildMessageEl(m)));
    feed.scrollTop = feed.scrollHeight;
  }

  function buildMessageEl(m) {
    const wrap = document.createElement('div');
    wrap.className = 'message';
    wrap.innerHTML = `
      <span class="avatar" style="background:${m.color};">${m.author[0]}</span>
      <div>
        <div class="meta"><span class="author"></span><span class="time"></span></div>
        <div class="body"></div>
      </div>`;
    wrap.querySelector('.author').textContent = m.author;
    wrap.querySelector('.time').textContent = m.time;
    wrap.querySelector('.body').textContent = m.text; // XSS-sicher
    return wrap;
  }

  function switchGroup(id) {
    activeId = id;
    renderSidebar();
    renderHeader();
    renderFeed();
  }

  // === Modals ===
  function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function createGroup() {
    const input = document.getElementById('newGroupName');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const id = 'g' + (nextId++);
    sampleGroups[id] = { name, members: [ME.name], ownerIsMe: true, messages: [] };
    input.value = '';
    closeModal('newGroupModal');
    switchGroup(id);
  }

  // === Composer ===
  function sendMessage() {
    const input = document.getElementById('composerInput');
    const text = input.value.trim();
    if (!text) return;
    const time = new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
    sampleGroups[activeId].messages.push({
      author: ME.name, color: ME.color, time, text,
    });
    input.value = '';
    renderFeed();
  }

  // Initial render
  renderSidebar();
  renderHeader();
  renderFeed();
</script>
</body>
</html>
