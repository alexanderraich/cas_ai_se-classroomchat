<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Classroom Chat — Mockup</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Login-Overlay (UC-1: Anzeigename festlegen) -->
<section class="onboarding" id="loginOverlay">
  <div class="card">
    <h1>Willkommen im Classroom Chat</h1>
    <p>Wähle einen Anzeigenamen — keine Registrierung nötig.</p>
    <form onsubmit="event.preventDefault(); login();">
      <div class="field">
        <label for="loginName">Anzeigename</label>
        <input id="loginName" type="text" placeholder="z. B. Mira" maxlength="32" autofocus />
      </div>
      <button type="submit">Loslegen</button>
      <div class="hint">1–32 Zeichen.</div>
    </form>
  </div>
</section>

<div class="app" id="appShell" style="display:none;">
  <aside class="sidebar">
    <header>
      <span class="brand">Classroom Chat</span>
    </header>
    <div class="me" style="padding: 10px 16px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
      <span style="display:flex; align-items:center; gap:8px;">
        <span class="avatar" id="meAvatar">M</span>
        <span id="meName">Mira</span>
      </span>
      <button class="icon" title="Abmelden" onclick="logout()">↪</button>
    </div>
    <nav class="group-list" id="groupList">
      <div class="group active" data-id="g1">
        <span># Projekt KI</span>
      </div>
      <div class="group" data-id="g2"><span># Übung 03</span></div>
      <div class="group" data-id="g3"><span># Smalltalk</span></div>
    </nav>
    <div class="new-group">
      <button class="secondary" style="width:100%;" onclick="openModal('newGroupModal')">+ Neue Gruppe</button>
    </div>
  </aside>

  <main class="chat">
    <header>
      <div>
        <h2 id="groupTitle"># Projekt KI</h2>
        <div class="subtitle"><span id="memberCount">4</span> Mitglieder</div>
      </div>
      <div>
        <button class="secondary" id="settingsBtn" onclick="openSettings()">Einstellungen</button>
      </div>
    </header>

    <div class="feed" id="feed">
      <!-- wird per JS gerendert -->
    </div>

    <div class="composer">
      <form onsubmit="event.preventDefault(); sendMessage();">
        <textarea id="composerInput" placeholder="Nachricht an # Projekt KI…" maxlength="2000"></textarea>
        <button type="submit">Senden</button>
      </form>
    </div>
  </main>
</div>

<!-- Modal: Neue Gruppe (UC-2) -->
<div class="modal-backdrop" id="newGroupModal" style="display:none;">
  <div class="modal">
    <header>
      <h3>Neue Gruppe</h3>
      <button class="icon" onclick="closeModal('newGroupModal')">✕</button>
    </header>
    <div class="body">
      <div class="field">
        <label for="newGroupName">Gruppenname</label>
        <input id="newGroupName" type="text" placeholder="z. B. Übung 04" maxlength="64" />
      </div>
      <div class="banner">Du wirst automatisch Eigentümer dieser Gruppe.</div>
    </div>
    <div class="footer">
      <button class="secondary" onclick="closeModal('newGroupModal')">Abbrechen</button>
      <button onclick="createGroup()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Modal: Einstellungen / Mitgliederverwaltung (UC-3..UC-6) -->
<div class="modal-backdrop" id="settingsModal" style="display:none;">
  <div class="modal">
    <header>
      <h3 id="settingsTitle">Gruppe verwalten</h3>
      <button class="icon" onclick="closeModal('settingsModal')">✕</button>
    </header>
    <div class="body">
      <div class="field">
        <label for="renameInput">Name der Gruppe</label>
        <input id="renameInput" type="text" maxlength="64" />
      </div>
      <div class="field">
        <label>Mitglieder</label>
        <ul class="member-list" id="memberList"></ul>
      </div>
      <div class="field">
        <label for="addMember">Mitglied hinzufügen</label>
        <form onsubmit="event.preventDefault(); addMember();" style="display:flex; gap:8px;">
          <input id="addMember" type="text" placeholder="Anzeigename…" maxlength="32" style="flex:1;" />
          <button class="secondary" type="submit">Hinzufügen</button>
        </form>
      </div>
    </div>
    <div class="footer">
      <button class="danger" onclick="deleteGroup()">Gruppe löschen</button>
      <span style="flex:1"></span>
      <button class="secondary" onclick="closeModal('settingsModal')">Abbrechen</button>
      <button onclick="saveSettings()">Speichern</button>
    </div>
  </div>
</div>

<script>
  // === Mock-State ===
  const ME = { name: 'Mira', initial: 'M', color: '#22c55e' };

  // === Login / Logout (UC-1) ===
  function login() {
    const input = document.getElementById('loginName');
    const name = input.value.trim();
    if (!name || name.length > 32) { input.focus(); return; }
    ME.name = name;
    ME.initial = name[0].toUpperCase();
    // Replace placeholder 'Mira' in sample data with the chosen name
    Object.values(sampleGroups).forEach(g => {
      g.members = g.members.map(m => m === 'Mira' ? ME.name : m);
      g.messages.forEach(m => { if (m.author === 'Mira') m.author = ME.name; });
    });
    document.getElementById('meName').textContent = name;
    document.getElementById('meAvatar').textContent = ME.initial;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appShell').style.display = 'grid';
    renderSidebar();
    renderHeader();
    renderFeed();
  }
  function logout() {
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('loginName').value = '';
    document.getElementById('loginName').focus();
  }

  const sampleGroups = {
    g1: {
      name: 'Projekt KI',
      members: ['Mira', 'Anna', 'Ben', 'Lukas'],
      ownerIsMe: true,
      messages: [
        { author: 'Anna',  color: '#7c3aed', time: '09:12', text: 'Wer übernimmt die Architektur-Folien?' },
        { author: 'Ben',   color: '#0ea5e9', time: '09:13', text: 'Ich kann das machen, brauche aber Input zum Deployment.' },
        { author: 'Mira',  color: '#22c55e', time: '09:14', text: 'Render.com — dazu gleich ein paar Notizen.' },
        { author: 'Lukas', color: '#f97316', time: '09:20', text: 'Treffen heute 14 Uhr im Raum B2.07?' },
      ],
    },
    g2: { name: 'Übung 03', members: ['Mira','Anna','Ben','Lukas','Sara','Tim','Eva','Jonas'], ownerIsMe: false, messages: [] },
    g3: { name: 'Smalltalk', members: ['Mira','Anna','Ben','Lukas','Sara','Tim'], ownerIsMe: false, messages: [] },
  };
  let activeId = 'g1';
  let nextId = 4;

  // === Rendering ===
  function renderSidebar() {
    const list = document.getElementById('groupList');
    list.innerHTML = '';
    Object.entries(sampleGroups).forEach(([id, g]) => {
      const el = document.createElement('div');
      el.className = 'group' + (id === activeId ? ' active' : '');
      el.dataset.id = id;
      const name = document.createElement('span');
      name.textContent = '# ' + g.name;
      el.appendChild(name);
      el.addEventListener('click', () => switchGroup(id));
      list.appendChild(el);
    });
  }

  function renderHeader() {
    const g = sampleGroups[activeId];
    document.getElementById('groupTitle').textContent = '# ' + g.name;
    document.getElementById('memberCount').textContent = g.members.length;
    document.getElementById('composerInput').placeholder = 'Nachricht an # ' + g.name + '…';
    const btn = document.getElementById('settingsBtn');
    btn.disabled = !g.ownerIsMe;
    btn.title = g.ownerIsMe ? 'Gruppe verwalten' : 'Nur der Eigentümer kann diese Gruppe verwalten';
    btn.style.opacity = g.ownerIsMe ? '1' : '0.5';
    btn.style.cursor = g.ownerIsMe ? 'pointer' : 'not-allowed';
  }

  function renderFeed() {
    const g = sampleGroups[activeId];
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    if (g.messages.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div style="font-size:32px; margin-bottom:8px;">💬</div>'
        + '<div><strong>Noch keine Nachrichten</strong></div>'
        + '<div>Sei die Erste, die hier etwas schreibt.</div>';
      feed.appendChild(empty);
      return;
    }
    g.messages.forEach(m => feed.appendChild(buildMessageEl(m)));
    feed.scrollTop = feed.scrollHeight;
  }

  function buildMessageEl(m) {
    const wrap = document.createElement('div');
    wrap.className = 'message';
    wrap.innerHTML = `
      <span class="avatar" style="background:${m.color};">${m.author[0]}</span>
      <div>
        <div class="meta"><span class="author"></span><span class="time"></span></div>
        <div class="body"></div>
      </div>`;
    wrap.querySelector('.author').textContent = m.author;
    wrap.querySelector('.time').textContent = m.time;
    wrap.querySelector('.body').textContent = m.text; // XSS-sicher
    return wrap;
  }

  function switchGroup(id) {
    activeId = id;
    renderSidebar();
    renderHeader();
    renderFeed();
  }

  // === Modals ===
  function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function createGroup() {
    const input = document.getElementById('newGroupName');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const id = 'g' + (nextId++);
    sampleGroups[id] = { name, members: [ME.name], ownerIsMe: true, messages: [] };
    input.value = '';
    closeModal('newGroupModal');
    switchGroup(id);
  }

  // === Gruppen-Einstellungen (UC-3..UC-6) ===
  function openSettings() {
    const g = sampleGroups[activeId];
    if (!g.ownerIsMe) return;
    document.getElementById('settingsTitle').textContent = 'Gruppe „' + g.name + '“ verwalten';
    document.getElementById('renameInput').value = g.name;
    renderMembers();
    openModal('settingsModal');
  }

  function renderMembers() {
    const g = sampleGroups[activeId];
    const ul = document.getElementById('memberList');
    ul.innerHTML = '';
    g.members.forEach(m => {
      const li = document.createElement('li');
      const isOwner = (m === ME.name && g.ownerIsMe);
      const left = document.createElement('span');
      left.style.display = 'flex';
      left.style.alignItems = 'center';
      left.style.gap = '8px';
      const av = document.createElement('span');
      av.className = 'avatar';
      av.textContent = m[0].toUpperCase();
      left.appendChild(av);
      const nm = document.createElement('span');
      nm.textContent = m;
      left.appendChild(nm);
      li.appendChild(left);
      if (isOwner) {
        const tag = document.createElement('span');
        tag.className = 'owner-tag';
        tag.textContent = 'Eigentümer';
        li.appendChild(tag);
      } else {
        const btn = document.createElement('button');
        btn.className = 'secondary';
        btn.textContent = 'Entfernen';
        btn.addEventListener('click', () => removeMember(m));
        li.appendChild(btn);
      }
      ul.appendChild(li);
    });
  }

  function addMember() {
    const input = document.getElementById('addMember');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const g = sampleGroups[activeId];
    if (g.members.includes(name)) {
      alert('„' + name + '“ ist bereits Mitglied.');
      return;
    }
    g.members.push(name);
    input.value = '';
    renderMembers();
    renderHeader();
  }

  function removeMember(name) {
    const g = sampleGroups[activeId];
    if (name === ME.name && g.ownerIsMe) return; // Eigentümer kann sich nicht entfernen
    g.members = g.members.filter(m => m !== name);
    renderMembers();
    renderHeader();
  }

  function saveSettings() {
    const g = sampleGroups[activeId];
    const newName = document.getElementById('renameInput').value.trim();
    if (!newName) return;
    g.name = newName;
    closeModal('settingsModal');
    renderSidebar();
    renderHeader();
  }

  function deleteGroup() {
    const g = sampleGroups[activeId];
    if (!confirm('Gruppe „' + g.name + '“ wirklich löschen?')) return;
    delete sampleGroups[activeId];
    closeModal('settingsModal');
    const remaining = Object.keys(sampleGroups);
    if (remaining.length) {
      switchGroup(remaining[0]);
    } else {
      activeId = null;
      renderSidebar();
      document.getElementById('groupTitle').textContent = 'Keine Gruppen';
      document.getElementById('memberCount').textContent = '0';
      document.getElementById('feed').innerHTML =
        '<div class="empty-state"><div><strong>Keine Gruppen vorhanden</strong></div>'
      + '<div>Erstelle links eine neue Gruppe, um zu starten.</div></div>';
    }
  }

  // === Composer ===
  function sendMessage() {
    if (!activeId) return;
    const input = document.getElementById('composerInput');
    const text = input.value.trim();
    if (!text) return;
    const time = new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
    sampleGroups[activeId].messages.push({
      author: ME.name, color: ME.color, time, text,
    });
    input.value = '';
    renderFeed();
  }

  // Initial render (App-Shell ist bis zum Login ausgeblendet)
  renderSidebar();
  renderHeader();
  renderFeed();
</script>
</body>
</html>
